<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cruise Compass Friend</title>
  <style>
    :root{--background:#f6f3ec;--foreground:#17242a;--panel:#fffaf1;--ink-soft:#52636b;--teal:#047d86;--teal-dark:#035d66;--coral:#d65a42;--sun:#f2bd4b;--line:#d9d0c1}*{box-sizing:border-box}html,body{min-height:100%;margin:0}body{background:linear-gradient(135deg,rgba(4,125,134,.14),transparent 34%),linear-gradient(315deg,rgba(214,90,66,.16),transparent 32%),var(--background);color:var(--foreground);font-family:Arial,Helvetica,sans-serif}.app-shell{min-height:100vh;display:grid;place-items:center;padding:24px}.phone-panel{width:min(100%,430px);min-height:min(860px,calc(100vh - 48px));display:flex;flex-direction:column;gap:18px;padding:22px;border:1px solid rgba(23,36,42,.14);border-radius:28px;background:color-mix(in srgb,var(--panel) 94%,white);box-shadow:0 24px 80px rgba(23,36,42,.18)}.top-bar{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}.eyebrow,.answer-label,.sources>p{margin:0;color:var(--teal-dark);font-size:.78rem;font-weight:800;letter-spacing:0;text-transform:uppercase}h1,h2,p{overflow-wrap:anywhere}h1{margin:4px 0 0;font-size:clamp(2rem,12vw,3.35rem);line-height:.95}.trip-chip{flex:0 0 auto;padding:8px 10px;border:1px solid var(--line);border-radius:999px;background:white;color:var(--ink-soft);font-size:.8rem;font-weight:700}.ask-zone{display:grid;place-items:center;gap:12px;padding:22px 10px 14px}.voice-button{width:168px;aspect-ratio:1;display:grid;place-items:center;gap:8px;border:0;border-radius:50%;background:radial-gradient(circle at 32% 24%,rgba(255,255,255,.78),transparent 26%),linear-gradient(150deg,var(--teal),var(--teal-dark));color:white;font-size:1.28rem;font-weight:900;box-shadow:0 18px 36px rgba(4,125,134,.32);cursor:pointer}.voice-button.listening{background:radial-gradient(circle at 32% 24%,rgba(255,255,255,.7),transparent 26%),linear-gradient(150deg,var(--coral),#9f3d2f);animation:listenPulse 1.1s ease-in-out infinite}.voice-dot{width:36px;height:36px;border-radius:50%;background:linear-gradient(90deg,white 8px,transparent 8px 14px,white 14px 22px,transparent 22px 28px,white 28px),rgba(255,255,255,.18)}.voice-status{min-height:42px;margin:0;color:var(--ink-soft);text-align:center;font-size:.95rem;line-height:1.35}.search-form{display:grid;gap:8px}.search-form label{color:var(--ink-soft);font-size:.86rem;font-weight:800}.input-row{display:grid;grid-template-columns:1fr auto;gap:8px}input,button{font:inherit}.input-row input{min-width:0;height:48px;padding:0 14px;border:1px solid var(--line);border-radius:8px;background:white;color:var(--foreground);outline:none}.input-row input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(4,125,134,.14)}.input-row button,.quick-grid button{border:1px solid rgba(4,125,134,.18);border-radius:8px;background:#eaf7f5;color:var(--teal-dark);font-weight:850;cursor:pointer}.input-row button{min-width:64px;height:48px;padding:0 14px}.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.quick-grid button{min-height:44px;padding:8px 10px;text-align:left;font-size:.84rem;line-height:1.15}.answer-area{flex:1;min-height:210px;display:flex}.loading,.empty-state,.answer-card{width:100%;border:1px solid var(--line);border-radius:8px;background:white}.loading{display:grid;place-items:center;margin:0;padding:24px;color:var(--ink-soft)}.empty-state{display:grid;align-content:center;gap:8px;padding:22px}.empty-state h2,.answer-card h2{margin:0;font-size:1.18rem;line-height:1.2}.empty-state p{margin:0;color:var(--ink-soft);line-height:1.45}.answer-card{display:grid;align-content:start;gap:12px;padding:18px}.answer-text{margin:0;color:#273940;line-height:1.48}.sources{display:grid;gap:8px;padding-top:6px}.sources article{display:grid;gap:4px;padding:10px;border-left:4px solid var(--sun);border-radius:6px;background:#fff7df}.sources strong{color:#7a4516;font-size:.82rem}.sources span{color:#3f4c50;font-size:.86rem;line-height:1.35}@keyframes listenPulse{0%,100%{transform:scale(1);box-shadow:0 18px 36px rgba(214,90,66,.28)}50%{transform:scale(1.04);box-shadow:0 22px 52px rgba(214,90,66,.42)}}@media(max-width:460px){.app-shell{padding:0;place-items:stretch}.phone-panel{width:100%;min-height:100vh;border:0;border-radius:0;box-shadow:none}.top-bar{flex-direction:column}.trip-chip{align-self:flex-start}}
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="phone-panel" aria-label="Cruise Compass voice search">
      <div class="top-bar"><div><p class="eyebrow">Odyssey of the Seas</p><h1>Cruise Compass Friend</h1></div><div class="trip-chip">May 17, 2026</div></div>
      <div class="ask-zone"><button id="voiceButton" class="voice-button" type="button" aria-label="Start voice search"><span class="voice-dot" aria-hidden="true"></span><span id="voiceButtonText">Voice</span></button><p id="voiceStatus" class="voice-status">Tap Voice and ask about the trip.</p></div>
      <form id="searchForm" class="search-form"><label for="question">Ask from trip info</label><div class="input-row"><input id="question" placeholder="Example: What are we doing in Santorini?" autocomplete="off" /><button type="submit">Ask</button></div></form>
      <div id="quickGrid" class="quick-grid" aria-label="Quick questions"></div>
      <section id="answerArea" class="answer-area" aria-live="polite"><p class="loading">Loading trip information...</p></section>
    </section>
  </main>
  <script>
    const quickQuestions=["What is happening tonight?","What time is breakfast?","What are we doing on September 15?","When is the Amalfi tour?","What is the Ephesus plan?","What happens in Naples?"];
    const stopWords=new Set(["a","am","an","and","are","at","can","do","does","for","from","i","in","is","it","me","my","of","on","or","pm","the","there","to","today","tonight","we","what","when","where","with"]);
    const intentTerms={breakfast:["breakfast","brunch","cafe","buffet","windjammer","dining"],dinner:["dinner","dining","restaurant","main dining","specialty"],show:["show","theater","entertainment","music hall","karaoke","showtime"],kids:["kids","children","family","teen","adventure ocean","seaplex"],port:["port","arrival","departure","ashore","gangway","tender"],casino:["casino","slots","tables","royale"],internet:["voom","internet","wifi","starlink"],fitness:["fitness","gym","spa","sports","flowrider","north star"],itinerary:["itinerary","travel","flight","airport","hotel","tour","train","coach"],rome:["rome","roma","fiumicino","fco","termini","leonardo","vatican","peter"],amalfi:["amalfi","positano","coast"],santorini:["santorini","oia","fira","tender","cable","taxi"],ephesus:["kusadasi","turkey","ephesus","celsus","theatre","roman"],mykonos:["mykonos","chora","venice","paraportiani","windmills"],naples:["naples","pompeii","pizza","neapolitan"]};
    let compassData=null, searchChunks=[], askedQuestion="", recognition=null, isListening=false;
    const qs=(id)=>document.getElementById(id);
    function escapeHtml(value){return value.replace(/[&<>"]/g,(c)=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]))}
    function normalize(value){return value.toLowerCase().replace(/[^a-z0-9:\s]/g," ")}
    function tokenize(value){return normalize(value).split(/\s+/).filter(term=>term.length>1&&!stopWords.has(term))}
    function expandTerms(query){const base=new Set(tokenize(query));const lowered=normalize(query);Object.entries(intentTerms).forEach(([intent,terms])=>{if(lowered.includes(intent)||terms.some(term=>lowered.includes(term))){terms.forEach(term=>term.split(/\s+/).forEach(word=>base.add(word)))}});return Array.from(base)}
    function asksItinerary(terms){return terms.some(term=>["itinerary","travel","flight","airport","hotel","tour","train","coach","rome","amalfi","positano","santorini","oia","fira","kusadasi","turkey","ephesus","mykonos","naples","pompeii","september","2026"].includes(term))}
    function scoreChunk(chunk,query,terms){const text=normalize(chunk.text);const compactQuery=normalize(query).trim();let score=0;terms.forEach(term=>{const safe=term.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");const matches=text.match(new RegExp(`\\b${safe}\\b`,"g"));if(matches)score+=matches.length*(term.length>4?3:2)});if(compactQuery.length>5&&text.includes(compactQuery))score+=18;if(text.includes("daily planner"))score+=2;if(text.includes("dining")&&terms.some(term=>["breakfast","lunch","dinner","dining"].includes(term)))score+=5;if(text.includes("deck")&&terms.some(term=>["where","show","dining","casino"].includes(term)))score+=2;if(chunk.sourceType==="itinerary"&&asksItinerary(terms))score+=25;if(chunk.sourceType==="itinerary"&&/\bseptember\b/.test(text)&&/\bseptember\b/.test(compactQuery))score+=18;return score}
    function cleanSnippet(text,query){const terms=expandTerms(query);const sentences=text.replace(/\s+/g," ").split(/(?<=[.!?])\s+|(?=\b\d{1,2}:\d{2}\s?(?:am|pm|AM|PM)\b)/).map(s=>s.trim()).filter(Boolean);const best=sentences.map(sentence=>({sentence,score:terms.reduce((total,term)=>total+(normalize(sentence).includes(term)?1:0),0)})).sort((a,b)=>b.score-a.score).slice(0,3).map(item=>item.sentence);const picked=best.length?best:sentences.slice(0,2);return picked.join(" ").replace(/\s+/g," ").slice(0,520)}
    function buildAnswer(question,chunks){const terms=expandTerms(question);if(!terms.length)return{summary:"Ask about a ship activity, dining time, venue, service, show, port detail, flight, hotel, tour, or travel date.",matches:[]};const pool=asksItinerary(terms)?chunks.filter(chunk=>chunk.sourceType==="itinerary"):chunks;const matches=pool.map(chunk=>({chunk,score:scoreChunk(chunk,question,terms)})).filter(item=>item.score>0).sort((a,b)=>b.score-a.score).slice(0,4).map(item=>item.chunk);if(!matches.length)return{summary:"I could not find a close match in the trip information. Try asking with words like dining, show, deck, port, Santorini, Ephesus, Naples, flight, hotel, or tour.",matches};return{summary:cleanSnippet(matches[0].text,question),matches}}
    function renderEmpty(){qs("answerArea").innerHTML=`<div class="empty-state"><h2>Ready for your question</h2><p>Search is built from ${compassData.pages} OCR-read Cruise Compass pages plus the Mediterranean travel itinerary.</p></div>`}
    function ask(value){const trimmed=(value||qs("question").value).trim();if(!trimmed||!searchChunks.length)return;qs("question").value=trimmed;askedQuestion=trimmed;const answer=buildAnswer(trimmed,searchChunks);qs("answerArea").innerHTML=`<div class="answer-card"><p class="answer-label">Answer from trip info</p><h2>${escapeHtml(trimmed)}</h2><p class="answer-text">${escapeHtml(answer.summary)}</p>${answer.matches.length?`<div class="sources"><p>Best source matches</p>${answer.matches.map(match=>`<article><strong>${escapeHtml(match.label||`Page ${match.page}`)}</strong><span>${escapeHtml(cleanSnippet(match.text,trimmed))}</span></article>`).join("")}</div>`:""}</div>`}
    function setListening(value){isListening=value;qs("voiceButton").classList.toggle("listening",value);qs("voiceButtonText").textContent=value?"Listening":"Voice";qs("voiceButton").setAttribute("aria-label",value?"Stop listening":"Start voice search")}
    function startVoice(){const Recognition=window.SpeechRecognition||window.webkitSpeechRecognition;if(!Recognition){qs("voiceStatus").textContent="Voice search is not available in this browser. Type your question instead.";return}if(isListening){recognition&&recognition.stop();setListening(false);return}recognition=new Recognition();recognition.continuous=false;recognition.interimResults=false;recognition.lang="en-US";recognition.onresult=(event)=>{const transcript=event.results[0]&&event.results[0][0]?event.results[0][0].transcript:"";if(transcript)ask(transcript);qs("voiceStatus").textContent=transcript?"I heard your question.":"I did not catch that. Try again."};recognition.onerror=()=>{qs("voiceStatus").textContent="Voice search stopped. Check microphone permission or type your question.";setListening(false)};recognition.onend=()=>setListening(false);setListening(true);qs("voiceStatus").textContent="Listening now. Ask your cruise question.";recognition.start()}
    quickQuestions.forEach(item=>{const button=document.createElement("button");button.type="button";button.textContent=item;button.addEventListener("click",()=>ask(item));qs("quickGrid").appendChild(button)});
    qs("searchForm").addEventListener("submit",event=>{event.preventDefault();ask()});qs("voiceButton").addEventListener("click",startVoice);
    Promise.all([fetch("cruise-compass-data.json").then(r=>r.json()),fetch("travel-itinerary-data.json").then(r=>r.json()).catch(()=>({chunks:[]}))]).then(([data,itinerary])=>{compassData=data;searchChunks=[...data.chunks.map(chunk=>({...chunk,sourceType:"pdf",label:`PDF page ${chunk.page}`})),...(itinerary.chunks||[]).map(chunk=>({...chunk,sourceType:"itinerary",label:chunk.label||chunk.page||"Travel itinerary"}))];renderEmpty()}).catch(()=>{qs("voiceStatus").textContent="The trip data did not load. Refresh the page and try again.";qs("answerArea").innerHTML='<p class="loading">Could not load the trip data.</p>'});
  </script>
</body>
</html>
